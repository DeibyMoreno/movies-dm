"""
Favorito de un usuario (película o serie).
"""
type Favorite {
  """Identificador único UUID."""
  id: ID!
  """ID del usuario que marcó como favorito."""
  userId: ID!
  """ID de la película favorita (null si es serie)."""
  movieId: ID
  """ID de la serie favorita (null si es película)."""
  serieId: ID
  """Película favorita."""
  movie: Movie
  """Serie favorita."""
  serie: Serie
  """Usuario que marcó como favorito."""
  user: User!
  """Fecha de creación del favorito."""
  createdAt: DateTime!
}

"""
Resultado de la operación toggleFavorite.
"""
type ToggleFavoritePayload {
  """Indica si el favorito fue agregado (true) o removido (false)."""
  added: Boolean!
  """Datos del favorito (null si fue removido)."""
  favorite: Favorite
}

input ToggleFavoriteInput {
  """ID de la película a marcar/desmarcar."""
  movieId: ID
  """ID de la serie a marcar/desmarcar."""
  serieId: ID
}

extend type Query {
  """Lista paginada de favoritos del usuario autenticado."""
  favorites(pagination: PaginationInput): [Favorite!]! @auth
}

extend type Mutation {
  """Agrega o remueve un favorito (toggle). Requiere autenticación."""
  toggleFavorite(input: ToggleFavoriteInput!): ToggleFavoritePayload! @auth
}
